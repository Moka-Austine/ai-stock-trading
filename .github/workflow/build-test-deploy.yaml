name: CI/CD 

on:
  push:
    branches: [main]

env:
  IMAGE_TAG: "1.0.${{ github.run_number }}"

jobs:

  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Node setup with cache
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: stockai-web/package-lock.json

      - name: Install Node dependencies
        run: |
          cd stockai-web
          npm ci

      - name: Run Node tests
        run: echo "testing node"

      # Python setup with cache
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12
          cache: pip

      - name: Install Python dependencies
        run: |
          cd fastapi
          pip install -r requirements.txt

      - name: Run Python tests
        run: echo "testing python"

  docker_build:
    runs-on: ubuntu-latest
    needs: build_and_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build containers
        run: docker compose build

      - name: Start containers
        run: docker compose up -d

      - name: Security scan
        run: echo "scan images with trivy / snyk"

# pushing to remote registry
      - name: Push image
        run: echo "pushing image:${{ env.IMAGE_TAG }}"